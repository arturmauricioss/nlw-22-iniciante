<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
	<button id="upload_widget" class="cloudinary-button">Upload files</button>

	<script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript">

	</script>  

	<script type="text/javascript">

	const app ={
		transcriptionURL:'',
		public_id:'',
		version:'',
		waitForTranscription: async function(){
			console.log('Starting waitForTranscription, version:', this.version, 'public_id:', this.public_id);
			const url = `https://res.cloudinary.com/${config.cloudName}/raw/upload/v${this.version}/${this.public_id}.transcript`;
			console.log('URL:', url);
			const maxAttempts = 30;
			const pollInterval = 2000; // 2 seconds
			
			for (let attempts = 0; attempts < maxAttempts; attempts++) {
				try {
					const response = await fetch(url);
					if (response.ok) {
						this.transcriptionURL = url;
						console.log('Transcription ready:', url);
						// Optionally call this.getTranscription();
						return; // Exit the loop when ready
					}
				} catch (error) {
					console.log('Error fetching transcription:', error);
				}
				
				// Wait before next attempt
				if (attempts < maxAttempts - 1) {
					await new Promise(resolve => setTimeout(resolve, pollInterval));
				}
			}
			
			console.log('Transcription not ready after 30 attempts');
		},
		getTranscription: async function(){
			const response = await fetch(this.transcriptionURL);
			return response.text()
		},
		getViralMoment: async function(){
			const transcription = await this.getTranscription();
		}
	}

	const config = {
		cloudName: 'dl9rcui2b', 
		uploadPreset: 'upload_nlw'
	}

	const myWidget = cloudinary.createUploadWidget( config, 
	async (error, result) => { 
		if (!error && result && result.event === "success") { 
				console.log('Done! Here is the image info: ', result.info); 
				app.public_id = result.info.public_id;
				app.version = result.info.version;
				console.log('Set app.public_id:', app.public_id, 'app.version:', app.version);
				
				await app.waitForTranscription();
			}
		}
	)

	document.getElementById("upload_widget").addEventListener("click", function(){
		myWidget.open();
	}, false);

	</script>
</body>
</html>
